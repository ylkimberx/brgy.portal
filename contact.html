<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f6fc;
}

/* HEADER */
header{
    background:#446bae;
    color:white;
    text-align:center;
    padding:20px;
}

/* NAV */
nav{
    background:#062a63;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#ffd24d;
}

/* CONTAINER */
.container{
    padding:30px;
    max-width:1000px;
    margin:auto;
}

/* GRID */
.contact-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* 💙 CARD (LIGHT BLUE BORDER DESIGN) */
.card{
    background: rgba(255,255,255,0.85);
    padding:25px;
    border-radius:15px;

    border:3px solid #7ec8ff;   /* LIGHT BLUE BORDER */
    box-shadow:0 8px 20px rgba(0,0,0,0.12);

    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px);
    box-shadow:0 12px 25px rgba(126,200,255,0.4);
}

/* FORM */
input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

/* BUTTON */
button{
    background:#0b3d91;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    cursor:pointer;
}

button:hover{
    background:#062a63;
}

/* MAP */
.map-container iframe{
    width:100%;
    height:250px;
    border:0;
    border-radius:10px;
}

/* POPUP */
#popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#4CAF50;
    color:white;
    padding:15px 20px;
    border-radius:10px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FLOATING BUTTONS */
.floating{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.floating a{
    text-decoration:none;
    background:#25D366;
    color:white;
    padding:12px 15px;
    border-radius:50px;
    font-weight:bold;
}

.floating a.call{
    background:#0b3d91;
}

/* RESPONSIVE */
@media(max-width:768px){
    .contact-grid{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<nav>
<a href="index (1).html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="news.html">News</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<div class="contact-grid">

<!-- FORM -->
<div class="card">
<h2>Send Message</h2>

<form id="contactForm">
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email Address" required>
    <textarea rows="6" placeholder="Write your message..." required></textarea>
    <button type="submit">Send Message</button>
</form>

</div>

<!-- ADDRESS + MAP -->
<div class="card">
<h2>Barangay Address</h2>

<p>
Barangay Quinagaringan Pequeno<br>
Passi City, Iloilo, Philippines
</p>

<h2>Location Map</h2>

<div class="map-container">
<iframe 
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d33146.64443371699!2d122.57563816299019!3d11.123410970770877!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33af13127811932b%3A0x71fe8689c7c67807!2sQuinagaringan%20Peque%C3%B1o%2C%20Passi%20City%2C%20Iloilo!5e0!3m2!1sen!2sph!4v1776440447428!5m2!1sen!2sph">
</iframe>
</div>

</div>

</div>

</div>

<!-- POPUP -->
<div id="popup">Message Sent Successfully ✅</div>

<!-- FLOATING BUTTONS -->
<div class="floating">
<a href="https://m.me/" target="_blank">💬 Messenger</a>
<a href="tel:09123456789" class="call">📞 Call</a>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("popup").style.display = "block";

    setTimeout(()=>{
        document.getElementById("popup").style.display = "none";
    }, 3000);

    this.reset();
});
</script>

</body>
</html>
